# Milvus Vector Database for AutoRAG
# AutoRAG requires a remote Milvus instance (inline Milvus is NOT supported).
# This deploys a standalone Milvus suitable for demo/dev use.
apiVersion: v1
kind: Secret
metadata:
  name: milvus-secret
  namespace: ${NAMESPACE}
type: Opaque
stringData:
  MILVUS_TOKEN: "root:Milvus"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  namespace: ${NAMESPACE}
  labels:
    app: milvus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.4.17
          command: ["milvus", "run", "standalone"]
          ports:
            - containerPort: 19530
              name: grpc
            - containerPort: 9091
              name: metrics
          env:
            - name: ETCD_USE_EMBED
              value: "true"
            - name: ETCD_DATA_DIR
              value: "/var/lib/milvus/etcd"
            - name: ETCD_CONFIG_PATH
              value: "/milvus/configs/embedEtcd.yaml"
            - name: COMMON_STORAGETYPE
              value: "local"
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
            - name: config
              mountPath: /milvus/configs/embedEtcd.yaml
              subPath: embedEtcd.yaml
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          configMap:
            name: milvus-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: milvus-config
  namespace: ${NAMESPACE}
data:
  embedEtcd.yaml: |
    listen-client-urls: http://0.0.0.0:2379
    advertise-client-urls: http://0.0.0.0:2379
    quota-backend-bytes: 4294967296
    auto-compaction-mode: revision
    auto-compaction-retention: '1000'
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: ${NAMESPACE}
  labels:
    app: milvus
spec:
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: metrics
      port: 9091
      targetPort: 9091
  type: ClusterIP
