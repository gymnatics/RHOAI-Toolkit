---
# AWS Bedrock Secret
# Fill in your AWS credentials
apiVersion: v1
kind: Secret
metadata:
  name: bedrock-secret
  namespace: NAMESPACE_PLACEHOLDER
type: Opaque
stringData:
  aws-access-key-id: "YOUR-AWS-ACCESS-KEY-ID"
  aws-secret-access-key: "YOUR-AWS-SECRET-ACCESS-KEY"
  aws-region: "us-east-1"

