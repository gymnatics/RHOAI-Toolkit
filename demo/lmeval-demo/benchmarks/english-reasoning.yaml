# English Reasoning Benchmarks
# ARC Challenge + HellaSwag + Winogrande
# Tests commonsense reasoning and science QA
#
# Usage:
#   export NAMESPACE MODEL_NAME MODEL_NAMESPACE SA_TOKEN TOKENIZER
#   envsubst < english-reasoning.yaml | oc apply -f -
---
apiVersion: trustyai.opendatahub.io/v1alpha1
kind: LMEvalJob
metadata:
  name: eval-arc-challenge
  namespace: ${NAMESPACE}
spec:
  model: local-completions
  modelArgs:
    - name: model
      value: "${MODEL_NAME}"
    - name: tokenizer
      value: "${TOKENIZER}"
    - name: tokenized_requests
      value: "False"
  taskList:
    taskNames:
      - arc_challenge
  numFewShot: 25
  batchSize: "auto"
  logSamples: true
  pod:
    container:
      env:
        - name: OPENAI_API_KEY
          value: "${SA_TOKEN}"
        - name: OPENAI_BASE_URL
          value: "https://${MODEL_NAME}-predictor.${MODEL_NAMESPACE}.svc:8080/v1"
        - name: OPENAI_VERIFY_SSL
          value: "False"
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
