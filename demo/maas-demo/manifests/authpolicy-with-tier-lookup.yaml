# AuthPolicy with Tier Lookup for RHOAI 3.3 MaaS
#
# This AuthPolicy adds tier resolution to the default maas-default-gateway-authn
# policy created by the odh-model-controller.
#
# The default policy only handles authentication and authorization but does NOT
# resolve user tiers. This manifest adds the metadata section to call maas-api
# for tier lookup, enabling tier-based rate limiting.
#
# IMPORTANT: The odh-model-controller will recreate the AuthPolicy if the model
# is redeployed. You may need to reapply this patch after model changes.
#
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: maas-default-gateway-authn
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/component: llminferenceservice-policies
    app.kubernetes.io/managed-by: odh-model-controller
    app.kubernetes.io/name: llminferenceservice-auth
    app.kubernetes.io/part-of: llminferenceservice
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
  rules:
    authentication:
      kubernetes-user:
        kubernetesTokenReview:
          audiences:
          - https://kubernetes.default.svc
        credentials: {}
        defaults:
          userid:
            expression: auth.identity.user.username
    authorization:
      inference-access:
        kubernetesSubjectAccessReview:
          authorizationGroups:
            expression: auth.identity.user.groups
          resourceAttributes:
            group:
              value: serving.kserve.io
            name:
              expression: request.path.split("/")[2]
            namespace:
              expression: request.path.split("/")[1]
            resource:
              value: llminferenceservices
            verb:
              value: get
          user:
            expression: auth.identity.user.username
        priority: 1
    # Tier lookup - calls maas-api to resolve user's tier based on group membership
    metadata:
      matchedTier:
        http:
          url: https://maas-api.redhat-ods-applications.svc.cluster.local:8443/v1/tiers/lookup
          method: POST
          contentType: application/json
          body:
            expression: '{ "groups": auth.identity.user.groups }'
        cache:
          key:
            selector: auth.identity.user.username
          ttl: 300
    # Inject tier into identity context for rate limiting
    response:
      success:
        filters:
          identity:
            json:
              properties:
                tier:
                  expression: auth.metadata.matchedTier["tier"]
                userid:
                  expression: auth.identity.user.username
