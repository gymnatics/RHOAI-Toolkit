# TokenRateLimitPolicy for MaaS Tier-Based Rate Limiting (PRODUCTION)
# This policy targets the maas-default-gateway used by RHOAI 3.3+
#
# This is the PRODUCTION version with 1-hour windows and higher limits.
# For demo/testing, use tokenratelimitpolicy.yaml (1-minute windows)
#
# To apply production limits:
#   oc apply -f tokenratelimitpolicy-production.yaml
apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: maas-tier-token-rate-limits
  namespace: openshift-ingress
  labels:
    opendatahub.io/dashboard: "true"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
  limits:
    # Free tier - 10,000 tokens per hour
    # Groups: system:authenticated, tier-free-users
    free-tokens:
      rates:
        - limit: 10000
          window: 1h0m0s
      when:
        - predicate: 'auth.identity.tier == "free" && !request.path.endsWith("/v1/models")'
      counters:
        - expression: auth.identity.userid
    # Premium tier - 50,000 tokens per hour
    # Groups: tier-premium-users, premium-group
    premium-tokens:
      rates:
        - limit: 50000
          window: 1h0m0s
      when:
        - predicate: 'auth.identity.tier == "premium" && !request.path.endsWith("/v1/models")'
      counters:
        - expression: auth.identity.userid
    # Enterprise tier - 100,000 tokens per hour
    # Groups: tier-enterprise-users, enterprise-group, admin-group
    enterprise-tokens:
      rates:
        - limit: 100000
          window: 1h0m0s
      when:
        - predicate: 'auth.identity.tier == "enterprise" && !request.path.endsWith("/v1/models")'
      counters:
        - expression: auth.identity.userid
