# NeMo Guardrails Service Account
#
# Usage:
#   export NAMESPACE=my-project
#   envsubst < nemo-guardrails-sa.yaml | oc apply -f -
#
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nemo-guardrails-service-account
  namespace: ${NAMESPACE}
---
apiVersion: v1
kind: Secret
metadata:
  name: nemo-guardrails-sa-token
  namespace: ${NAMESPACE}
  annotations:
    kubernetes.io/service-account.name: nemo-guardrails-service-account
type: kubernetes.io/service-account-token
