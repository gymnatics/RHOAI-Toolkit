# Microloan Web Application - OpenShift Deployment
# Deploy with: oc apply -f deployment.yaml
# Then build: oc start-build microloan-webapp --from-dir=. -n microloan-web-app
---
apiVersion: v1
kind: Namespace
metadata:
  name: microloan-web-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-config
  namespace: microloan-web-app
data:
  SKLEARN_API_URL: "PLACEHOLDER_SKLEARN_URL"
  LLM_API_URL: "PLACEHOLDER_LLM_URL"
  LLM_MODEL_NAME: "qwen3-4b"
  FLASK_ENV: "production"
  HOST: "0.0.0.0"
  PORT: "8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: webapp-secret
  namespace: microloan-web-app
type: Opaque
stringData:
  SECRET_KEY: "change-this-in-production"
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: microloan-webapp
  namespace: microloan-web-app
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: microloan-webapp
  namespace: microloan-web-app
spec:
  output:
    to:
      kind: ImageStreamTag
      name: microloan-webapp:latest
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microloan-webapp
  namespace: microloan-web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microloan-webapp
  template:
    metadata:
      labels:
        app: microloan-webapp
    spec:
      containers:
      - name: webapp
        image: image-registry.openshift-image-registry.svc:5000/microloan-web-app/microloan-webapp:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: webapp-config
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: webapp-secret
              key: SECRET_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: microloan-webapp
  namespace: microloan-web-app
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: microloan-webapp
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: microloan-webapp
  namespace: microloan-web-app
spec:
  to:
    kind: Service
    name: microloan-webapp
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
