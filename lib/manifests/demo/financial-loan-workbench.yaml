# Workbench for Micro Financial Loan Demo
#
# Usage:
#   export NAMESPACE=financial-loan-demo WORKBENCH_IMAGE=...
#   envsubst < financial-loan-workbench.yaml | oc apply -f -
#
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: financial-loan-workbench
  namespace: ${NAMESPACE}
  labels:
    app: financial-loan-workbench
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/image-display-name: "Standard Data Science"
    notebooks.opendatahub.io/inject-oauth: "true"
    notebooks.opendatahub.io/oauth-logout-url: ""
spec:
  template:
    spec:
      containers:
        - name: financial-loan-workbench
          image: ${WORKBENCH_IMAGE:-image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/jupyter-datascience-notebook:2024.2}
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          env:
            - name: NOTEBOOK_ARGS
              value: "--NotebookApp.token='' --NotebookApp.password=''"
            - name: GIT_REPO_URL
              value: "https://github.com/cbtham/micro-financial-loan.git"
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          volumeMounts:
            - name: workspace
              mountPath: /opt/app-root/src
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: financial-loan-workbench
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: financial-loan-workbench
  namespace: ${NAMESPACE}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
