# Kubernetes MCP Server
# Provides Kubernetes API access for LLMs via Model Context Protocol
# 
# Usage: oc apply -f mcp-kubernetes.yaml -n <namespace>
#
# This deploys:
# - ServiceAccount with read-only cluster access
# - Deployment running the MCP server
# - Service exposing the MCP endpoint
#
# After deployment, register in LlamaStack config:
#   tool_groups:
#   - toolgroup_id: mcp::kubernetes
#     provider_id: model-context-protocol
#     mcp_endpoint:
#       uri: http://kubernetes-mcp-server.<namespace>.svc.cluster.local/mcp
#
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-namespace-view
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - services
      - endpoints
      - configmaps
      - secrets
      - namespaces
      - namespaces/status
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["serving.kserve.io"]
    resources:
      - inferenceservices
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-namespace-view-binding
subjects:
  - kind: ServiceAccount
    name: mcp-server
roleRef:
  kind: ClusterRole
  name: mcp-namespace-view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  labels:
    app: kubernetes-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app: kubernetes-mcp-server
    spec:
      serviceAccountName: mcp-server
      securityContext:
        runAsNonRoot: true
      containers:
        - name: server
          image: quay.io/redhat-ai-services/kubernetes-mcp-server
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: info
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-mcp-server
  labels:
    app: kubernetes-mcp-server
spec:
  selector:
    app: kubernetes-mcp-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
