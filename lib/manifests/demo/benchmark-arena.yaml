# Benchmark Arena - Model Comparison UI
# 
# Usage: oc apply -f benchmark-arena.yaml -n <namespace>
#
# Access via route:
#   echo "https://$(oc get route benchmark-arena -o jsonpath='{.spec.host}')"
#
# Features:
#   - Side-by-side model comparison
#   - Real-time response streaming
#   - Latency and throughput metrics
#   - Support for multiple model endpoints
#
# Configure endpoints in the UI:
#   Model A: https://model-a.apps.cluster.example.com/v1
#   Model B: https://model-b.apps.cluster.example.com/v1
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark-arena
  labels:
    app: benchmark-arena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: benchmark-arena
  template:
    metadata:
      labels:
        app: benchmark-arena
    spec:
      containers:
        - name: benchmark-arena
          image: quay.io/ltsai/benchmark-arena:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: benchmark-arena
  labels:
    app: benchmark-arena
spec:
  selector:
    app: benchmark-arena
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: benchmark-arena
spec:
  to:
    kind: Service
    name: benchmark-arena
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
