# DataScienceCluster v2 for RHOAI 3.2+
# 
# This configuration:
# - Enables all core components for GenAI workloads
# - Includes NIM support for NVIDIA models
# - Enables Feast Operator for Feature Store
# - Uses RawDeployment mode (Headless) for llm-d compatibility
# - Sets Kueue to Unmanaged (installed separately for better control)
#
# Based on CAI's guide to RHOAI 3.2
#
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  labels:
    app.kubernetes.io/name: datasciencecluster
spec:
  components:
    # AI Pipelines for ML workflows
    aipipelines:
      managementState: Managed
    
    # Dashboard for RHOAI UI
    dashboard:
      managementState: Managed
    
    # Data Science Pipelines (legacy - use aipipelines instead)
    datasciencepipelines:
      managementState: Managed
    
    # Feast Operator for Feature Store (NEW in 3.2)
    feastoperator:
      managementState: Managed
    
    # KServe for model serving (with NIM support)
    kserve:
      managementState: Managed
      nim:
        managementState: Managed
      rawDeploymentServiceConfig: Headless
    
    # Kueue for job queuing (Unmanaged - installed separately)
    kueue:
      defaultClusterQueueName: default
      defaultLocalQueueName: default
      managementState: Unmanaged
    
    # LlamaStack for AI orchestration
    llamastackoperator:
      managementState: Managed
    
    # ModelMesh for multi-model serving (optional)
    modelmeshserving:
      managementState: Managed
    
    # Model Registry for model versioning
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    
    # Ray for distributed computing
    ray:
      managementState: Managed
    
    # Training Operator for model training
    trainingoperator:
      managementState: Managed
    
    # TrustyAI for model evaluation and safety
    trustyai:
      eval:
        lmeval:
          permitCodeExecution: deny
          permitOnline: deny
      managementState: Managed
    
    # Workbenches for Jupyter notebooks
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
