# DataScienceCluster for RHOAI 3.3
# This configuration enables all major components for a full RHOAI 3.3 installation
# Requires: NFD, GPU Operator, Kueue, cert-manager, RHCL (for MaaS), LWS (for llm-d multi-node)
# Optional: JobSet operator (required if trainer.managementState: Managed)
#
# Reference: https://gist.github.com/bryonbaker/7949f6d060181bfd6ae7a8ee2793207b
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  labels:
    app.kubernetes.io/name: datasciencecluster
spec:
  components:
    # Dashboard - OpenShift AI web interface
    dashboard:
      managementState: Managed
    
    # Workbenches - Jupyter notebooks and IDEs
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
    
    # AI Pipelines - ML workflow automation
    aipipelines:
      managementState: Managed
      argoWorkflowsControllers:
        managementState: Managed
    
    # KServe - Model serving platform (required for vLLM, llm-d)
    kserve:
      managementState: Managed
      # RawDeployment with Headed config (required for Guardrails + TrustyAI)
      defaultDeploymentMode: RawDeployment
      rawDeploymentServiceConfig: Headed
      # NVIDIA NIM support
      nim:
        managementState: Managed
      # MaaS - Models as a Service (Tech Preview)
      # Requires: RHCL operator, Gateway API
      modelsAsService:
        managementState: Managed
    
    # Kueue - Workload scheduling
    # Set to Unmanaged when using Red Hat Build of Kueue Operator (standalone)
    # The standalone operator provides more control over Kueue configuration
    kueue:
      defaultClusterQueueName: default
      defaultLocalQueueName: default
      managementState: Unmanaged
    
    # Ray - Distributed computing framework
    ray:
      managementState: Managed
    
    # Trainer - Kubeflow Trainer v2 (GA in RHOAI 3.3)
    # New unified training API replacing Training Operator v1
    # IMPORTANT: Requires JobSet operator to be installed first!
    # Install JobSet: oc apply -f lib/manifests/operators/jobset-subscription.yaml
    # Set to Removed if JobSet is not installed
    trainer:
      managementState: Removed
    
    # Training Operator - Legacy distributed training (deprecated in 3.3)
    # Set to Removed if using Trainer (v2) instead
    trainingoperator:
      managementState: Removed
    
    # Model Registry - Model versioning and tracking
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    
    # TrustyAI - Model explainability and fairness
    trustyai:
      managementState: Managed
    
    # Feast Operator - Feature Store
    feastoperator:
      managementState: Managed
    
    # Llama Stack Operator - GenAI orchestration, RAG
    llamastackoperator:
      managementState: Managed
    
    # MLflow Operator - Experiment tracking, model versioning
    mlflowoperator:
      managementState: Managed
